# CD Pipeline: Deploy to Azure (Dev → Staging → Production)
# Triggered on successful CI builds from develop (dev/staging) or main (prod)

trigger: none

resources:
  pipelines:
    - pipeline: CI_Build
      source: eshoponweb-ci-docker-github
      trigger:
        branches:
          include:
            - main
        stages:
          - Image_Scanning  # This tells CD: "Wait until CI reaches and finishes this stage"

  repositories:
    - repository: self
      type: github
      name: $(GITHUB_OWNER)/$(GITHUB_REPO)
      endpoint: $(GITHUB_ENDPOINT)
      trigger: none

variables:
  # Reference variable groups from Azure DevOps (linked to Key Vault)
  - group: Common-Secrets
  - group: Build-Config
  - group: Deployment-Config

stages:

- stage: Deploy_Infrastructure
  displayName: Deploy Common Infrastructure
  jobs:
  - job: DeployInfra
    pool:
      vmImage: ubuntu-latest
    steps:
    # - task: AzureCLI@2
    #   displayName: 'Deploy Key Vault'
    #   inputs:
    #     azureSubscription: $(AZURE_SERVICE_CONNECTION)
    #     scriptType: bash
    #     scriptLocation: inlineScript
    #     inlineScript: |
    #       az deployment group create \
    #         --resource-group $(RESOURCE_GROUP) \
    #         --template-file infra/keyvault.bicep \
    #         --parameters infra/keyvault.parameters.json \
    #         --output json

    - task: AzureResourceManagerTemplateDeployment@3
      displayName: 'Deploy Application Insights'
      inputs:
        deploymentScope: 'Resource Group'
        azureResourceManagerConnection: '$(AZURE_SERVICE_CONNECTION)'
        subscriptionId: '$(SUBSCRIPTION_ID)'
        action: 'Create Or Update Resource Group'
        resourceGroupName: '$(RESOURCE_GROUP)'
        location: '$(LOCATION)'
        templateLocation: 'Linked artifact'
        csmFile: 'infra/appinsights.bicep' # Path to your file
        overrideParameters: >
          -logAnalyticsWorkspaceName "$(LAW_NAME)"
          -applicationInsightsName "$(APP_INSIGHTS_NAME)"
          -dailyDataCapInGb 1
        deploymentMode: 'Incremental'
        deploymentOutputs: 'appInsightsOutputs' # Saves outputs as a JSON string

    - task: PowerShell@2
      name: setAppInsightsVars
      displayName: 'Set App Insights outputs as pipeline variables'
      inputs:
        targetType: 'inline'
        script: |
          $raw = $env:APPINSIGHTS_OUTPUTS

          if ([string]::IsNullOrWhiteSpace($raw)) {
            Write-Error 'appInsightsOutputs is empty. Ensure deploymentOutputs is configured on the ARM deployment task.'
            exit 1
          }

          try {
            $parsed = $raw | ConvertFrom-Json
          }
          catch {
            Write-Error 'Failed to parse appInsightsOutputs JSON.'
            throw
          }

          # ARM task output shape can be either:
          # 1) { outputName: { type, value }, ... }
          # 2) { properties: { outputs... } }
          if ($null -ne $parsed.properties) {
            $outputs = $parsed.properties
          }
          else {
            $outputs = $parsed
          }

          if ($null -eq $outputs.logAnalyticsWorkspaceId -or [string]::IsNullOrWhiteSpace([string]$outputs.logAnalyticsWorkspaceId.value)) {
            Write-Error 'Required output logAnalyticsWorkspaceId was not found in appInsightsOutputs.'
            exit 1
          }

          if ($null -eq $outputs.appInsightsConnectionString -or [string]::IsNullOrWhiteSpace([string]$outputs.appInsightsConnectionString.value)) {
            Write-Error 'Required output appInsightsConnectionString was not found in appInsightsOutputs.'
            exit 1
          }

          $sensitiveNamePattern = '(?i)(secret|password|token|key|connectionstring|instrumentationkey)'
          $properties = $outputs.PSObject.Properties
          foreach ($property in $properties) {
            $name = $property.Name
            $node = $property.Value

            if ($null -ne $node.value) {
              $value = [string]$node.value
            }
            else {
              $value = [string]$node
            }

            Write-Host "Setting variable $name"
            $isSensitive = $name -match $sensitiveNamePattern
            if ($isSensitive) {
              Write-Host "Variable $name marked as secret output."
              Write-Host "##vso[task.setvariable variable=$name;isOutput=true;issecret=true]$value"
            }
            else {
              Write-Host "##vso[task.setvariable variable=$name;isOutput=true]$value"
            }
          }

          Write-Host 'Verified required outputs and published pipeline variables: logAnalyticsWorkspaceId, appInsightsConnectionString'
      env:
        APPINSIGHTS_OUTPUTS: $(appInsightsOutputs)
    
    
    - task: AzureResourceManagerTemplateDeployment@3
      displayName: 'Deploy App Service (Development)'
      inputs:
        deploymentScope: 'Resource Group'
        azureResourceManagerConnection: $(AZURE_SERVICE_CONNECTION)
        subscriptionId: $(SUBSCRIPTION_ID)
        action: 'Create Or Update Resource Group'
        resourceGroupName: '$(RESOURCE_GROUP)'
        location: '$(LOCATION)'
        templateLocation: 'Linked artifact'
        csmFile: 'infra/webapp-docker.bicep'
        # csmParametersFile: 'infra/webapp-docker-dev.parameters.json'
        deploymentMode: 'Incremental'
        deploymentOutputs: 'webAppOutputs'
        overrideParameters: >
          -appInsightsConnectionString "$(setAppInsightsVars.appInsightsConnectionString)"
          -logAnalyticsWorkspaceId "$(setAppInsightsVars.logAnalyticsWorkspaceId)"
          -stagingImageTag "$(resources.pipeline.CI_Build.runID)"

    - task: PowerShell@2
      name: setWebAppVars
      displayName: 'Set web app outputs as pipeline variables'
      inputs:
        targetType: 'inline'
        script: |
          $raw = $env:WEBAPP_OUTPUTS

          if ([string]::IsNullOrWhiteSpace($raw)) {
            Write-Error 'webAppOutputs is empty. Ensure deploymentOutputs is configured on the ARM deployment task.'
            exit 1
          }

          try {
            $parsed = $raw | ConvertFrom-Json
          }
          catch {
            Write-Error 'Failed to parse webAppOutputs JSON.'
            throw
          }

          if ($null -ne $parsed.properties) {
            $outputs = $parsed.properties
          }
          else {
            $outputs = $parsed
          }

          if ($null -eq $outputs.webAppName -or [string]::IsNullOrWhiteSpace([string]$outputs.webAppName.value)) {
            Write-Error 'Required output webAppName was not found in webAppOutputs.'
            exit 1
          }

          if ($null -eq $outputs.slotName -or [string]::IsNullOrWhiteSpace([string]$outputs.slotName.value)) {
            Write-Error 'Required output slotName was not found in webAppOutputs.'
            exit 1
          }

          Write-Host "##vso[task.setvariable variable=webAppName;isOutput=true]$($outputs.webAppName.value)"
          Write-Host "##vso[task.setvariable variable=slotName;isOutput=true]$($outputs.slotName.value)"
          Write-Host "##vso[task.setvariable variable=webAppPrincipalId;isOutput=true]$($outputs.webAppPrincipalId.value)"
          Write-Host "##vso[task.setvariable variable=stagingSlotPrincipalId;isOutput=true]$($outputs.stagingSlotPrincipalId.value)"
          Write-Host 'Published pipeline variables: webAppName, slotName, webAppPrincipalId, stagingSlotPrincipalId'
      env:
        WEBAPP_OUTPUTS: $(webAppOutputs)
    


    - task: AzureResourceManagerTemplateDeployment@3
      displayName: 'Add role assignment (Dev)'
      retryCountOnTaskFailure: 2
      inputs:
        deploymentScope: 'Resource Group'
        azureResourceManagerConnection: $(AZURE_SERVICE_CONNECTION)
        subscriptionId: $(SUBSCRIPTION_ID)
        action: 'Create Or Update Resource Group'
        resourceGroupName: '$(RESOURCE_GROUP)'
        location: '$(LOCATION)'
        templateLocation: 'Linked artifact'
        csmFile: 'infra/webapp-to-acr-roleassignment.bicep'
        deploymentMode: 'Incremental'
        overrideParameters: >
          -webAppPrincipalId "$(setWebAppVars.webAppPrincipalId)"
          -stagingSlotPrincipalId "$(setWebAppVars.stagingSlotPrincipalId)"

    - task: AzureCLI@2
      displayName: 'Blue-Green: Deploy container image to staging slot'
      inputs:
        azureSubscription: $(AZURE_SERVICE_CONNECTION)
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -euo pipefail

          WEBAPP_NAME="$(setWebAppVars.webAppName)"
          SLOT_NAME="$(setWebAppVars.slotName)"
          IMAGE_TAG="$(resources.pipeline.CI_Build.runID)"

          ACR_NAME="$(REGISTRY)"
          if ! az acr show --name "$ACR_NAME" --resource-group "$(RESOURCE_GROUP)" >/dev/null 2>&1; then
            ACR_NAME=$(az acr list --resource-group "$(RESOURCE_GROUP)" --query "[0].name" -o tsv)
          fi

          if [ -z "$ACR_NAME" ] || [ "$ACR_NAME" = "null" ]; then
            echo "No Azure Container Registry found in resource group $(RESOURCE_GROUP)."
            exit 1
          fi

          ACR_LOGIN_SERVER=$(az acr show --name "$ACR_NAME" --resource-group "$(RESOURCE_GROUP)" --query "loginServer" -o tsv)
          IMAGE_NAME="${ACR_LOGIN_SERVER}/$(IMAGE_REPO):${IMAGE_TAG}"

          echo "Deploying ${IMAGE_NAME} to slot ${SLOT_NAME} on ${WEBAPP_NAME}..."
          az webapp config container set \
            --resource-group "$(RESOURCE_GROUP)" \
            --name "$WEBAPP_NAME" \
            --slot "$SLOT_NAME" \
            --container-image-name "$IMAGE_NAME" \
            --container-registry-url "https://${ACR_LOGIN_SERVER}"

          az webapp restart \
            --resource-group "$(RESOURCE_GROUP)" \
            --name "$WEBAPP_NAME" \
            --slot "$SLOT_NAME"

    - task: AzureCLI@2
      displayName: 'Blue-Green: Smoke test staging slot'
      inputs:
        azureSubscription: $(AZURE_SERVICE_CONNECTION)
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -euo pipefail
          WEBAPP_NAME="$(setWebAppVars.webAppName)"
          SLOT_NAME="$(setWebAppVars.slotName)"
          SLOT_URL="https://${WEBAPP_NAME}-${SLOT_NAME}.azurewebsites.net/health"

          echo "Waiting for slot warmup..."
          sleep 30
          echo "Checking health endpoint at $SLOT_URL"
          curl -f "$SLOT_URL"
          echo "Staging slot health check passed"

  - job: AwaitProductionApproval
    displayName: 'Await approval before production swap'
    dependsOn: DeployInfra
    condition: succeeded()
    pool: server
    timeoutInMinutes: 1440
    steps:
    - task: ManualValidation@0
      timeoutInMinutes: 1440
      inputs:
        notifyUsers: $(ADMIN_EMAIL)
        instructions: |
          Review the staging slot validation results before promoting this deployment.
          Approve to swap the staging slot into production.
        onTimeout: 'reject'

  - job: SwapToProduction
    displayName: 'Swap staging slot to production'
    dependsOn:
    - DeployInfra
    - AwaitProductionApproval
    condition: succeeded()
    pool:
      vmImage: ubuntu-latest
    variables:
      webAppName: $[ dependencies.DeployInfra.outputs['setWebAppVars.webAppName'] ]
      slotName: $[ dependencies.DeployInfra.outputs['setWebAppVars.slotName'] ]
    steps:
    - task: AzureCLI@2
      displayName: 'Blue-Green: Swap staging slot to production'
      inputs:
        azureSubscription: $(AZURE_SERVICE_CONNECTION)
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -euo pipefail
          WEBAPP_NAME="$(webAppName)"
          SLOT_NAME="$(slotName)"

          az webapp deployment slot swap \
            --resource-group "$(RESOURCE_GROUP)" \
            --name "$WEBAPP_NAME" \
            --slot "$SLOT_NAME" \
            --target-slot production

    - task: AzureCLI@2
      displayName: 'Validate policy compliance'
      inputs:
        azureSubscription: $(AZURE_SERVICE_CONNECTION)
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az security assessment list \
            --query "[?contains(id, '/resourceGroups/$(RESOURCE_GROUP)/')].{Name:displayName, Status:status.code}" \
            --output table

