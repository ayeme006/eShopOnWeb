# CI Pipeline: Optimized Single-Stage "Speed & Secucrity"
name: $(Date:yyyy.MM.dd)$(Rev:.r)

trigger:
  batch: true # Consolidate multiple pushes into one run
  branches:
    include: [ main ]

pr:
  branches:
    include: [ main ]

# --- THE RESTORED RESOURCES BLOCK ---
resources:
  repositories:
    - repository: self
      type: github
      name: $(GITHUB_OWNER)/$(GITHUB_REPO)
      endpoint: $(GITHUB_ENDPOINT) # This points to your GitHub Service Connection
      trigger: none # We use the top-level trigger instead
# ------------------------------------

variables:
  # Reference variable groups from Azure DevOps (linked to Key Vault)
  - group: Common-Secrets
  - group: Build-Config
  - group: Deployment-Config
  # Local overrides (if needed)
  - name: NUGET_PACKAGES_PATH
    value: $(HOME)/.nuget/packages
  - name: DOTNET_SKIP_FIRST_TIME_EXPERIENCE # Speed hack: skip .NET welcome text
    value: true
  - name: DOTNET_CLI_TELEMETRY_OPTOUT
    value: true
  - name: canary.isPreRelease
    value: $[ne(variables['Build.SourceBranch'], 'refs/heads/main')]
 


jobs:
- job: Consolidated_CI
  displayName: 'Full Verification & Containerization'
  pool:
    vmImage: 'ubuntu-latest'
  steps:
  # 1. ENVIRONMENT SETUP
  - task: UseDotNet@2
    displayName: 'Use .NET $(DOTNET_VERSION)'
    inputs:
      version: $(DOTNET_VERSION)

  # 2. GLOBAL NUGET CACHE
  - task: Cache@2
    displayName: 'Cache NuGet packages'
    inputs:
      key: 'nuget | "$(Agent.OS)" | **/*.csproj'
      path: $(NUGET_PACKAGES_PATH)
      cacheHitVar: CACHE_RESTORED
      restoreKeys: |
        nuget | "$(Agent.OS)"

  # 3. SONARCLOUD PREPARATION
  - task: SonarCloudPrepare@3
    displayName: 'Prepare SonarCloud Analysis'
    inputs:
      SonarCloud: '$(SONARCLOUDCONNECTION)'
      organization: '$(SONARCLOUD_ORG)'
      scannerMode: 'dotnet'
      projectKey: '$(SONARCLOUD_PROJECT_KEY)'
      projectName: '$(SONARCLOUD_PROJECT_NAME)'

  # 4. CONSOLIDATED RESTORE & BUILD
  - task: DotNetCoreCLI@2
    displayName: 'Restore & Build Solution'
    inputs:
      command: build
      projects: '**/*.sln'
      arguments: '--configuration Release /p:ContinuousIntegrationBuild=true'

  # 5. TEST WITH COVERAGE (Using --no-build for speed)
  - task: DotNetCoreCLI@2
    displayName: 'Execute Unit Tests'
    inputs:
      command: test
      projects: '**/*UnitTests/*.csproj'
      arguments: '--configuration Release --no-build --collect:"XPlat Code Coverage"'
      publishTestResults: true

  # 6. SONARCLOUD EXECUTION
  - task: SonarCloudAnalyze@3
    displayName: 'Run Code Quality Analysis'

   # SONARCLOUD PUBLISHING (Only on main branch)
  - task: SonarCloudPublish@3
    displayName: 'Publish SonarCloud results'
    # Only publish if we're on main branch - SonarCloud free plan only allows publish on main branch, but we still want analysis to run on PRs and other branches for quality gates and feedback
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    inputs:
      pollingTimeoutSec: '300'

  # 7. INFRASTRUCTURE VALIDATION (Bicep)
  - task: AzureCLI@2
    displayName: 'Lint Bicep templates'
    inputs:
      azureSubscription: $(AZURE_SERVICE_CONNECTION)
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        # Install Bicep CLI
        az bicep install
        # Lint all Bicep files
        for file in infra/*.bicep; do
          echo "Linting $file..."
          az bicep build --file "$file"
          az bicep lint --file "$file"
        done

  # 8. DEPENDENCY SCANNING (OWASP)
  - task: Cache@2
    displayName: 'Cache Dependency-Check NVD data'
    inputs:
      key: 'dependency-check | "$(Agent.OS)" | "12.1.0"'
      restoreKeys: |
        dependency-check | "$(Agent.OS)"
      path: '$(Pipeline.Workspace)/dependency-check-data'
    
  - script: |
      set -euo pipefail
      DC_VERSION="12.1.0"
      if [ ! -d "dependency-check" ]; then
        curl -sSL "https://github.com/jeremylong/DependencyCheck/releases/download/v${DC_VERSION}/dependency-check-${DC_VERSION}-release.zip" -o dc.zip
        unzip -q dc.zip && chmod +x dependency-check/bin/dependency-check.sh
      fi
      ./dependency-check/bin/dependency-check.sh \
        --project eShopOnWeb --scan src --format JSON --out reports/ \
        --data "$(Pipeline.Workspace)/dependency-check-data" \
        --nvdApiKey "$(NVDAPIKEY)"
    displayName: 'OWASP Dependency Scan'

  # 9. DOCKER BUILD & PUSH (With In-Line Layer Cache)
  - task: AzureCLI@2
    displayName: 'Docker Build & Push'
    inputs:
      azureSubscription: $(AZURE_SERVICE_CONNECTION)
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        set -euo pipefail

          ACR_NAME="$(REGISTRY)"
          RESOURCE_GROUP="$(RESOURCE_GROUP)"

          echo "Checking for ACR: $ACR_NAME..."

          # 2. Fallback to listing if the specific name still isn't found
          if ! az acr show --name "$ACR_NAME" --resource-group "$RESOURCE_GROUP" >/dev/null 2>&1; then
            echo "Configured ACR '$ACR_NAME' not found. Using first ACR in resource group $RESOURCE_GROUP..."
            ACR_NAME=$(az acr list --resource-group "$RESOURCE_GROUP" --query "[0].name" -o tsv)
          fi

          if [ -z "$ACR_NAME" ] || [ "$ACR_NAME" = "null" ]; then
            echo "No Azure Container Registry found in resource group $RESOURCE_GROUP."
            exit 1
          fi

          # 3. Get Login Server and Login
          ACR_LOGIN_SERVER=$(az acr show --name "$ACR_NAME" --resource-group "$RESOURCE_GROUP" --query "loginServer" -o tsv)

          IMAGE_PATH="${ACR_LOGIN_SERVER}/$(IMAGE_REPO)"

          echo "Logging into ACR ${ACR_NAME}..."
          az acr login --name "$ACR_NAME"
        
        # Optimization: Pull latest image as cache source
        docker pull "${IMAGE_PATH}:latest" || true
        
        docker build --cache-from "${IMAGE_PATH}:latest" \
          -f src/Web/Dockerfile \
          -t "${IMAGE_PATH}:$(Build.BuildId)" \
          -t "${IMAGE_PATH}:latest" .
        
        docker push "${IMAGE_PATH}:$(Build.BuildId)"
        docker push "${IMAGE_PATH}:latest"
        
        echo "##vso[task.setvariable variable=acrLoginServer;]$ACR_LOGIN_SERVER"
  
  # 10. CONTAINER IMAGE SCANNING (Trivy)
  - script: |
      TRIVY_VERSION="0.60.0"
      ACR_LOGIN_SERVER=$(az acr show --name $(REGISTRY) --query "loginServer" -o tsv)
      IMAGE_PATH="${ACR_LOGIN_SERVER}/$(IMAGE_REPO):$(Build.BuildId)"
      
      docker run --rm -v /var/run/docker.sock:/var/run/docker.sock -v "$(pwd):/work" \
        aquasec/trivy:${TRIVY_VERSION} image \
        --severity CRITICAL,HIGH --format json --output /work/trivy-report.json \
        "$IMAGE_PATH"
    displayName: 'Trivy Vulnerability Scan'

  # 11. ARTIFACT PUBLICATION
  - task: PublishBuildArtifacts@1
    displayName: 'Publish Security Reports'
    inputs:
      pathToPublish: 'reports/'
      artifactName: 'security-reports'
    condition: always()

  - task: PublishBuildArtifacts@1
    displayName: 'Publish build artifacts'
    inputs:
      pathToPublish: '$(Build.ArtifactStagingDirectory)'
      artifactName: 'build'























